<div class="app-shell">
  <header class="app-header">
    <div>
      <p class="eyebrow">Movie Hub</p>
      <h1>{{ title }}</h1>
      <p class="subtitle">Browse movies, save favorites, and leave reviews.</p>
    </div>

    <nav class="app-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Movies</a>
      <a routerLink="/favorites" routerLinkActive="active">Favorites</a>
    </nav>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
