<div class="movie-card" *ngIf="movie">
  <a [routerLink]="['/movie', movie.id]">
    <img [src]="movie.posterUrl || '/assets/images/placeholder.png'" alt="poster" />
  </a>
  <div class="movie-card__topline">
    <h3><a [routerLink]="['/movie', movie.id]">{{ movie.title }}</a></h3>
    <button type="button" (click)="toggleFavorite()">{{ isFavorite ? '★ Favorite' : '☆ Favorite' }}</button>
  </div>
  <p>{{ movie.genre }} • {{ movie.year }}</p>
  <p>Average rating: {{ averageRating || 'N/A' }}</p>

  <app-review-list [movieId]="movie.id" (averageChanged)="onAverageChanged($event)"></app-review-list>
</div>
